<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Product List Fixture</title>
  </head>
  <body>
    <h1>Product List</h1>
    <p class="fixture-hint">Local R1 list page (≥5 products: name, price, rating).</p>
    <ul id="product-list" data-testid="product-list">
      <li
        class="product"
        data-name="Alpha Wireless Headphones"
        data-price="$49.99"
        data-rating="4.5"
        data-testid="product-1">
        <span class="product-name">Alpha Wireless Headphones</span>
        <span class="product-price">$49.99</span>
        <span class="product-rating">4.5</span>
      </li>
      <li
        class="product"
        data-name="Beta Mechanical Keyboard"
        data-price="$89.00"
        data-rating="4.8"
        data-testid="product-2">
        <span class="product-name">Beta Mechanical Keyboard</span>
        <span class="product-price">$89.00</span>
        <span class="product-rating">4.8</span>
      </li>
      <li
        class="product"
        data-name="Gamma USB-C Hub"
        data-price="$34.50"
        data-rating="4.2"
        data-testid="product-3">
        <span class="product-name">Gamma USB-C Hub</span>
        <span class="product-price">$34.50</span>
        <span class="product-rating">4.2</span>
      </li>
      <li
        class="product"
        data-name="Delta Desk Lamp"
        data-price="$27.99"
        data-rating="4.0"
        data-testid="product-4">
        <span class="product-name">Delta Desk Lamp</span>
        <span class="product-price">$27.99</span>
        <span class="product-rating">4.0</span>
      </li>
      <li
        class="product"
        data-name="Epsilon Notebook Stand"
        data-price="$19.95"

        data-testid="product-5">
        <span class="product-name">Epsilon Notebook Stand</span>
        <span class="product-price">$19.95</span>
        <span class="product-rating">4.6</span>
      </li>
      <li
        class="product"
        data-name="Zeta Webcam Cover"
        data-price="$8.49"
        data-rating="3.9"
        data-testid="product-6">
        <span class="product-name">Zeta Webcam Cover</span>
        <span class="product-price">$8.49</span>
        <span class="product-rating">3.9</span>
      </li>
    </ul>
  </body>
</html>
